<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Wyvern Wings — Bearded Vet Studios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<meta name="robots" content="noindex">
<style>
  :root {
    --green:      #39ff14;
    --green-dim:  #1a7a08;
    --green-glow: rgba(57,255,20,0.18);
    --dark:       #0d0d0d;
    --card:       #111;
    --text:       #e8e0d0;
    --muted:      #7a7060;
    --white:      #ffffff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    text-align: center;
  }

  .logo {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.15em;
    margin-bottom: 48px;
    display: block;
    transition: color 0.2s;
  }
  .logo:hover { color: var(--green); }

  .eyebrow {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: var(--green);
    letter-spacing: 0.2em;
    margin-bottom: 20px;
  }

  h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(16px, 4vw, 28px);
    color: var(--white);
    line-height: 1.6;
    margin-bottom: 16px;
  }

  .tagline {
    font-size: 18px;
    color: var(--muted);
    margin-bottom: 48px;
    max-width: 420px;
    line-height: 1.7;
  }

  .store-buttons {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 340px;
    margin: 0 auto 48px;
  }

  .store-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 18px 28px;
    border-radius: 6px;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    text-decoration: none;
    letter-spacing: 0.08em;
    transition: transform 0.15s, box-shadow 0.15s;
    line-height: 1.6;
  }

  .store-btn:hover {
    transform: translateY(-2px);
  }

  .store-btn-ios {
    background: var(--green);
    color: #000;
    box-shadow: 0 0 24px rgba(57,255,20,0.3);
  }

  .store-btn-ios:hover {
    box-shadow: 0 0 36px rgba(57,255,20,0.5);
  }

  .store-btn-android {
    background: transparent;
    color: var(--green);
    border: 1px solid var(--green-dim);
    box-shadow: 0 0 12px rgba(57,255,20,0.08);
  }

  .store-btn-android:hover {
    border-color: var(--green);
    box-shadow: 0 0 24px rgba(57,255,20,0.2);
  }

  .store-btn-highlighted {
    position: relative;
  }

  .detected-badge {
    display: none;
    position: absolute;
    top: -10px;
    right: -10px;
    background: var(--green);
    color: #000;
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    padding: 4px 7px;
    border-radius: 4px;
    white-space: nowrap;
  }

  .store-btn-highlighted .detected-badge {
    display: block;
  }

  .price-note {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 40px;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: #1e1e1e;
    margin: 0 auto 24px;
  }

  .back-link {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.1em;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--green); }
</style>
</head>
<body>

<a href="https://beardedvetstudios.com" class="logo">Bearded Vet Studios</a>

<p class="eyebrow">// Get the Game</p>
<h1>Wyvern Wings</h1>
<p class="tagline">One purchase. No ads. No subscriptions. Just fly.</p>

<div class="store-buttons" id="storeButtons">
  <a href="https://apps.apple.com/us/app/wyvern-wings/id6781475307"
     class="store-btn store-btn-ios"
     id="iosBtn">
    <span class="detected-badge" id="iosBadge">Your Device</span>
    🍎 App Store
  </a>
  <a href="https://play.google.com/store/apps/details?id=com.beardedvetstudios.wyvernwings"
     class="store-btn store-btn-android"
     id="androidBtn">
    <span class="detected-badge" id="androidBadge">Your Device</span>
    ▶ Google Play
  </a>
</div>

<p class="price-note">$1.99 — Pay Once, Play Forever</p>

<div class="divider"></div>
<a href="https://beardedvetstudios.com/wyvernwings" class="back-link">▸ Learn More About the Game</a>

<script>
  const ua = navigator.userAgent || '';
  const isIOS = /iPhone|iPad|iPod/i.test(ua);
  const isAndroid = /Android/i.test(ua);

  if (isIOS) {
    document.getElementById('iosBtn').classList.add('store-btn-highlighted');
    document.getElementById('iosBadge').style.display = 'block';
    // Auto-redirect after short delay
    setTimeout(() => {
      window.location.href = 'https://apps.apple.com/us/app/wyvern-wings/id6781475307';
    }, 0);
  } else if (isAndroid) {
    document.getElementById('androidBtn').classList.add('store-btn-highlighted');
    document.getElementById('androidBadge').style.display = 'block';
    // Swap button order so Android is on top
    const buttons = document.getElementById('storeButtons');
    buttons.appendChild(document.getElementById('iosBtn'));
    // Auto-redirect after short delay
    setTimeout(() => {
      window.location.href = 'https://play.google.com/store/apps/details?id=com.beardedvetstudios.wyvernwings';
    }, 0);
  }
</script>

</body>
</html>
